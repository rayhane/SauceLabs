name: Selenium Tests - SauceLabs

# Déclenche le pipeline à chaque push sur main ou pull request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:

      # Étape 1 : Récupérer ton code depuis GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Installer Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # Étape 3 : Installer Google Chrome
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      # Étape 4 : Mettre en cache les dépendances Maven
      # (évite de re-télécharger Selenium, Cucumber etc. à chaque run)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Étape 5 : Lancer tous les tests Cucumber + Selenium
      - name: Run Selenium tests
        run: mvn test

      # Étape 6 : Sauvegarder les rapports de test
      # (s'exécute TOUJOURS, même si les tests échouent)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-test-results
          path: |
            target/surefire-reports/
            target/cucumber-reports/
          retention-days: 7